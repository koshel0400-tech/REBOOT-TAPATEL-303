name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Bubblewrap CLI
      run: npm install -g @bubblewrap/cli

    - name: Generate Signing Key and Build
      run: |
        # Автоматически создаем ключ подписи Android Keystore, чтобы сборщик не зависал
        keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass password123 -keypass password123 -dname "CN=Tapatel, OU=Dev, O=Game, L=City, S=State, C=US"
        
        # Создаем конфигурационный файл
        echo '{
          "twaName": "TAPATEL 303 REBOOT",
          "launches": [{"url": "https://koshel0400-tech.github.io/REBOOT-TAPATEL-303/"}],
          "packageId": "com.koshel0400tech.tapatel303",
          "host": "koshel0400-tech.github.io",
          "startUrl": "/REBOOT-TAPATEL-303/index.html",
          "themeColor": "#000000",
          "navigationColor": "#000000",
          "backgroundColor": "#ffffff",
          "actionColor": "#000000",
          "appVersionCode": 1,
          "appVersionName": "1.0.0",
          "display": "standalone",
          "orientation": "default",
          "shortcuts": [],
          "features": {},
          "alphaDependencies": false,
          "signingKey": {
            "path": "./android.keystore",
            "alias": "android"
          },
          "generatorApp": "bubblewrap-cli",
          "webManifestUrl": "https://koshel0400-tech.github.io/REBOOT-TAPATEL-303/manifest.json",
          "fallbackType": "customtabs"
        }' > ./twa-manifest.json

        # Инициализируем и собираем
        bubblewrap openjdk:install --acceptLicense
        bubblewrap androidSdk:install --acceptLicense
        bubblewrap update --meta=./twa-manifest.json
        bubblewrap build --meta=./twa-manifest.json --signingKeyPassword="password123" --keyPairPassword="password123"
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Tapatel-APK
        path: ./*.apk

